{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'src/lists.css' %}">
    <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer">  
    <title>Articles</title>
</head>
<body>
<header class="top-header">
        <a href="/"><img src="{% static 'img/banner_vidriera.png' %}" class=""></a>
    </header>
    <main>
        <section>
            <div class="card">
                <h1>Articles List</h1>
                <table class="table-content">
                    <tr>
                        <td>Title</td>
                        <td>Category</td>
                    </tr>
                    {% for article in articles %}
                    <tr>
                        <td>
                            <a href="{% url 'articles:article-detail' article.slug %}">{{ article.title }}</a>
                        </td>
                        <td>
                            {{article.category}}
                        </td>
                    </tr>
                    {% endfor %}    
                </table>
            </div>
                
        </section>

    </main>
    <footer class="footer-social">
        <div class="footer-social-top">
            <p>Follow us!</p>
            <div class="social-links">
                <a href="https://twitter.com/tu_usuario"><i class="fa-brands fa-x-twitter fa-2x"></i></a>
                <a href="https://github.com/tu_usuario"><i class="fa-brands fa-github fa-2x"></i></a>
                <a href="https://www.instagram.com/in/tu_usuario"><i class="fa-brands fa-instagram fa-2x"></i></a>
            </div>
        </div>
    <p class="footer-social-copy">© 2026 Dungeons and Dragos</p>
    </footer>
</body>
</html>
