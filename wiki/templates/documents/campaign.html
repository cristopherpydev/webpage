{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'src/campaign.css' %}">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer">
    <title>{{campaign.title}}</title>
</head>
<body>
    <header class="top-header">
        <a href="/"><img src="{% static 'img/banner.png' %}" class=""></a>
    </header>
    <div class="navegator">
        <div class="cards">
            {% for category in campaign.categories.all %}
                <a href="{% url 'articles:campaign-category-detail' campaign.slug category.slug %}"><div class="card red"><p>{{ category.category_name }}</p></div></a>
            {% endfor %}
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="title">
                <h1>{{campaign.title}}</h1>
            </div>
            <div class="content">
                <p>{{ campaign.description|linebreaks }}</p>
            </div>
        </div>
    </div>
    <footer class="footer-social">
        <div class="footer-social-top">
            <p>Follow us!</p>
            <div class="social-links">
                <a href="https://twitter.com/tu_usuario"><i class="fa-brands fa-x-twitter fa-2x"></i></a>
                <a href="https://github.com/tu_usuario"><i class="fa-brands fa-github fa-2x"></i></a>
                <a href="https://www.instagram.com/in/tu_usuario"><i class="fa-brands fa-instagram fa-2x"></i></a>
            </div>
        </div>
    <p class="footer-social-copy">© 2026 Dungeons and Dragos</p>
    </footer>
</body>
</html>
